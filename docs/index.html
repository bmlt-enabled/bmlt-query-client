<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMLT Query Client — Developer Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #07090d;
      --surface:       #0b0f16;
      --surface-r:     #10161f;
      --surface-h:     #141c27;
      --border:        #182030;
      --border-s:      #0f1620;
      --border-a:      #253348;
      --text:          #dbd3c0;
      --text-m:        #677385;
      --text-d:        #344152;
      --accent:        #c07840;
      --accent-b:      #d4894d;
      --accent-dim:    rgba(192,120,64,.12);
      --success:       #4e9e72;
      --success-bg:    rgba(78,158,114,.08);
      --error:         #c05858;
      --error-bg:      rgba(192,88,88,.08);
      --info:          #5a8ec0;
      --r:             6px;
      --rs:            4px;
      --t:             150ms ease;
      --ff-d:          'Fraunces', Georgia, serif;
      --ff-m:          'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-m);
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 10%, rgba(192,120,64,.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 15% 85%, rgba(90,142,192,.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 54px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,9,13,.96);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .h-brand { display: flex; align-items: baseline; gap: 12px; }

    .h-title {
      font-family: var(--ff-d);
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.02em;
    }

    .h-title em {
      font-style: italic;
      font-weight: 300;
      color: var(--accent);
    }

    .h-sub {
      font-size: 9px;
      color: var(--text-d);
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    .h-right { display: flex; align-items: center; gap: 14px; }

    .code-pill {
      font-size: 10px;
      color: var(--text-m);
      background: var(--surface-r);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 100px;
      font-family: var(--ff-m);
    }

    .server-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--text-m);
    }

    .server-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity:1; box-shadow: 0 0 6px var(--success); }
      50%      { opacity:.5; box-shadow: 0 0 2px var(--success); }
    }

    /* ── Layout ─────────────────────────────────────── */
    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 272px 1fr;
      height: calc(100vh - 54px);
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 16px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .s-section {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border-s);
    }
    .s-section:last-child { border-bottom: none; }

    .s-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--text-d);
      font-weight: 500;
      margin-bottom: 9px;
    }

    /* ── Inputs ─────────────────────────────────────── */
    .igroup { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }

    input[type='text'], input[type='number'] {
      width: 100%;
      padding: 7px 10px;
      background: var(--surface-r);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      color: var(--text);
      font-family: var(--ff-m);
      font-size: 12px;
      outline: none;
      transition: border-color var(--t);
    }
    input::placeholder { color: var(--text-d); }
    input:focus { border-color: var(--accent); }

    .radius-row { display: flex; align-items: center; gap: 8px; }
    .radius-row input { flex: 1; }
    .iunit { font-size: 10px; color: var(--text-d); white-space: nowrap; }

    /* ── Buttons ────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--rs);
      font-family: var(--ff-m);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t), transform var(--t);
      letter-spacing: .02em;
    }
    .btn-primary:hover { background: var(--accent-b); }
    .btn-primary:active { transform: scale(.98); }

    .btn-ghost {
      width: 100%;
      padding: 6px 10px;
      background: transparent;
      color: var(--text-m);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      font-family: var(--ff-m);
      font-size: 11px;
      cursor: pointer;
      transition: all var(--t);
      text-align: left;
      letter-spacing: .02em;
    }
    .btn-ghost:hover { background: var(--surface-h); color: var(--text); border-color: var(--border-a); }
    .btn-ghost:active { transform: scale(.98); }

    .btn-stack { display: flex; flex-direction: column; gap: 4px; }

    /* ── Chips ──────────────────────────────────────── */
    .chip-row { display: flex; flex-wrap: wrap; gap: 4px; }

    .chip {
      padding: 3px 7px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: transparent;
      color: var(--text-m);
      font-family: var(--ff-m);
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--t);
      letter-spacing: .04em;
    }
    .chip:hover { border-color: var(--border-a); color: var(--text); }
    .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-b); }

    /* ── Results pane ───────────────────────────────── */
    .results-pane { display: flex; flex-direction: column; overflow: hidden; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 22px;
      border-bottom: 1px solid var(--border-s);
      background: var(--surface);
      min-height: 40px;
      flex-shrink: 0;
    }

    .status-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-m);
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-d);
      flex-shrink: 0;
      transition: background var(--t);
    }
    .status-dot.loading { background: var(--info); animation: pulse-dot .8s ease-in-out infinite; }
    .status-dot.success { background: var(--success); }
    .status-dot.error   { background: var(--error); }

    .result-count { font-size: 10px; color: var(--text-d); }

    .results-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .results-scroll::-webkit-scrollbar { width: 3px; }
    .results-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Empty state ────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      gap: 10px;
    }
    .empty-icon { font-size: 28px; opacity: .12; }
    .empty-text { font-size: 12px; color: var(--text-d); }

    /* ── Skeleton ───────────────────────────────────── */
    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 7px;
    }
    .skel-line {
      height: 10px;
      background: var(--surface-r);
      border-radius: 3px;
      animation: skel 1.4s ease-in-out infinite;
    }
    .skel-line + .skel-line { margin-top: 7px; }
    @keyframes skel {
      0%,100% { opacity:.2; }
      50%      { opacity:.4; }
    }

    /* ── Meeting cards ──────────────────────────────── */
    .meeting-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 15px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: border-color var(--t), background var(--t);
      animation: card-in .25s ease forwards;
      position: relative;
      overflow: hidden;
    }

    .meeting-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--day-color, var(--border-a));
      transition: width var(--t);
    }
    .meeting-card:hover { border-color: var(--border-a); background: var(--surface-r); }
    .meeting-card:hover::before { width: 4px; }

    @keyframes card-in {
      from { opacity:0; transform: translateY(6px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .card-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    .day-badge {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .08em;
      padding: 2px 6px;
      border-radius: 100px;
      font-family: var(--ff-m);
      border: 1px solid var(--day-color, var(--border));
      color: var(--day-color, var(--text-m));
      background: var(--day-bg, rgba(255,255,255,.04));
    }

    .venue-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 100px;
      font-family: var(--ff-m);
    }
    .venue-badge.ip  { background:rgba(78,158,114,.1);  color:var(--success); border:1px solid rgba(78,158,114,.25); }
    .venue-badge.vrt { background:rgba(90,142,192,.1);  color:var(--info);    border:1px solid rgba(90,142,192,.25); }
    .venue-badge.hyb { background:rgba(192,120,64,.1);  color:var(--accent);  border:1px solid rgba(192,120,64,.25); }

    .dist-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 100px;
      background: var(--accent-dim);
      color: var(--accent-b);
      border: 1px solid rgba(192,120,64,.25);
    }

    .copy-btn {
      opacity: 0;
      background: transparent;
      border: none;
      color: var(--text-d);
      cursor: pointer;
      padding: 2px 5px;
      font-size: 12px;
      border-radius: 3px;
      transition: all var(--t);
      flex-shrink: 0;
    }
    .meeting-card:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text-m); background: var(--surface-h); }

    .meeting-name {
      font-family: var(--ff-d);
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -.01em;
    }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 12px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-m);
    }

    .meta-i {
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
    }
    .meta-icon { color: var(--text-d); font-size: 10px; flex-shrink: 0; }
    .meta-t { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .card-foot {
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid var(--border-s);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .fmt-tags { display: flex; flex-wrap: wrap; gap: 3px; }

    .fmt-tag {
      font-size: 9px;
      padding: 1px 5px;
      background: var(--surface-h);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-d);
    }

    .join-link {
      font-size: 10px;
      color: var(--info);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border: 1px solid rgba(90,142,192,.25);
      border-radius: var(--rs);
      background: rgba(90,142,192,.06);
      transition: all var(--t);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .join-link:hover { background: rgba(90,142,192,.12); border-color: var(--info); }

    /* ── Expanded details ───────────────────────────── */
    .card-exp { display: none; margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border-s); }
    .meeting-card.expanded .card-exp { display: block; }

    .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .exp-item {}
    .exp-lbl { font-size: 9px; color: var(--text-d); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1px; }
    .exp-val { font-size: 11px; color: var(--text-m); }

    /* ── Data cards (server info, formats, etc.) ────── */
    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 7px;
      animation: card-in .25s ease forwards;
    }

    .data-title {
      font-family: var(--ff-d);
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 7px;
      letter-spacing: -.01em;
    }

    .data-meta { font-size: 11px; color: var(--text-m); line-height: 1.9; }

    .data-tag {
      display: inline-block;
      font-size: 10px;
      background: var(--surface-h);
      border: 1px solid var(--border);
      color: var(--text-m);
      padding: 2px 7px;
      border-radius: 100px;
      margin: 2px 3px 2px 0;
    }

    pre.data-pre {
      font-family: var(--ff-m);
      font-size: 10px;
      color: var(--text-m);
      background: var(--surface-r);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 12px;
      overflow-x: auto;
      line-height: 1.7;
      white-space: pre;
      word-break: normal;
      margin-top: 10px;
    }
    pre.data-pre .json-key    { color: #7dd3fc; }
    pre.data-pre .json-str    { color: #86efac; }
    pre.data-pre .json-num    { color: #fda4af; }
    pre.data-pre .json-bool   { color: #c4b5fd; }
    pre.data-pre .json-null   { color: #94a3b8; }

    /* ── Load more ──────────────────────────────────── */
    .load-more-wrap { padding: 14px 0 2px; text-align: center; }

    .btn-load-more {
      padding: 7px 22px;
      background: transparent;
      color: var(--text-m);
      border: 1px solid var(--border-a);
      border-radius: var(--rs);
      font-family: var(--ff-m);
      font-size: 11px;
      cursor: pointer;
      transition: all var(--t);
    }
    .btn-load-more:hover { background: var(--surface-r); color: var(--text); }

    .lm-label { font-size: 10px; color: var(--text-d); margin-top: 5px; }

    /* ── Toast ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: var(--surface-r);
      border: 1px solid var(--border-a);
      color: var(--text);
      font-size: 11px;
      padding: 7px 13px;
      border-radius: var(--r);
      font-family: var(--ff-m);
      animation: toast-in .2s ease forwards;
      z-index: 9999;
      pointer-events: none;
    }
    @keyframes toast-in {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 760px) {
      html, body { overflow: auto; }
      .layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
      .sidebar { overflow: visible; border-right: none; border-bottom: 1px solid var(--border); }
      .results-pane { height: auto; }
      .results-scroll { overflow: visible; height: auto; min-height: 300px; }
      header { padding: 0 14px; }
      .code-pill { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="h-brand">
      <h1 class="h-title">BMLT <em>Query</em> Client</h1>
      <span class="h-sub">ES Module Demo</span>
    </div>
    <div class="h-right">
      <div class="code-pill">import { BmltClient } from 'cdn.aws.bmlt.app/app.js'</div>
      <div class="server-badge">
        <span class="server-dot"></span>
        <span>latest.aws.bmlt.app</span>
      </div>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">

      <div class="s-section">
        <div class="s-label">Location Search</div>
        <div class="igroup">
          <input type="text" id="addressInput" placeholder="Address or landmark" value="Raleigh, NC" />
          <div class="radius-row">
            <input type="number" id="radiusInput" value="2" min="0.5" max="50" step="0.5" />
            <span class="iunit">miles radius</span>
          </div>
        </div>
        <button class="btn-primary" onclick="searchByAddress()">Find Nearby Meetings</button>
      </div>

      <div class="s-section">
        <div class="s-label">Filter by Day</div>
        <div class="chip-row" id="dayFilters">
          <button class="chip active" data-day="all"  onclick="setDayFilter(this)">All</button>
          <button class="chip" data-day="1" onclick="setDayFilter(this)">Sun</button>
          <button class="chip" data-day="2" onclick="setDayFilter(this)">Mon</button>
          <button class="chip" data-day="3" onclick="setDayFilter(this)">Tue</button>
          <button class="chip" data-day="4" onclick="setDayFilter(this)">Wed</button>
          <button class="chip" data-day="5" onclick="setDayFilter(this)">Thu</button>
          <button class="chip" data-day="6" onclick="setDayFilter(this)">Fri</button>
          <button class="chip" data-day="7" onclick="setDayFilter(this)">Sat</button>
        </div>
      </div>

      <div class="s-section">
        <div class="s-label">Filter by Venue</div>
        <div class="chip-row" id="venueFilters">
          <button class="chip active" data-venue="all" onclick="setVenueFilter(this)">All</button>
          <button class="chip" data-venue="1" onclick="setVenueFilter(this)">In-Person</button>
          <button class="chip" data-venue="2" onclick="setVenueFilter(this)">Virtual</button>
          <button class="chip" data-venue="3" onclick="setVenueFilter(this)">Hybrid</button>
        </div>
      </div>

      <div class="s-section">
        <div class="s-label">Quick Search</div>
        <div class="btn-stack">
          <button class="btn-ghost" onclick="searchTodaysMeetings()">Today's Meetings</button>
          <button class="btn-ghost" onclick="searchWeekendMeetings()">This Weekend</button>
          <button class="btn-ghost" onclick="searchVirtualMeetings()">Virtual Meetings</button>
          <button class="btn-ghost" onclick="searchEveningMeetings()">Evening Meetings</button>
        </div>
      </div>

      <div class="s-section">
        <div class="s-label">Server Data</div>
        <div class="btn-stack">
          <button class="btn-ghost" onclick="getServerInfo()">Server Info</button>
          <button class="btn-ghost" onclick="getFormats()">Meeting Formats</button>
          <button class="btn-ghost" onclick="getServiceBodies()">Service Bodies</button>
        </div>
      </div>

      <div class="s-section">
        <div class="s-label">Geocoding</div>
        <div class="igroup">
          <input type="text" id="geocodeInput" placeholder="Address to geocode" value="Charleston, SC" />
        </div>
        <button class="btn-ghost" onclick="testGeocode()">Geocode Address</button>
      </div>

    </aside>

    <main class="results-pane">
      <div class="status-bar">
        <div class="status-msg">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Ready — select a search</span>
        </div>
        <span id="resultCount" class="result-count"></span>
      </div>

      <div class="results-scroll">
        <div id="results">
          <div class="empty-state">
            <div class="empty-icon">◎</div>
            <p class="empty-text">Select a search to see meetings</p>
          </div>
        </div>
        <div id="loadMoreWrap" class="load-more-wrap" style="display:none">
          <button class="btn-load-more" onclick="loadMore()">Load more</button>
          <div class="lm-label" id="lmLabel"></div>
        </div>
      </div>
    </main>

  </div>

  <script type="module">
    import { BmltClient, Weekday, VenueType, MeetingQueryBuilder, QuickSearch }
      from 'https://cdn.aws.bmlt.app/app.js';

    const client = new BmltClient({ serverURL: 'https://bmlt.sezf.org/main_server' });

    // ── State ──────────────────────────────────────────
    let allMeetings    = [];
    let displayedCount = 20;
    const PAGE        = 20;
    let activeDayFilter   = 'all';
    let activeVenueFilter = 'all';
    let isMeetingMode     = false;

    // ── Day metadata (weekday_tinyint: 1=Sun … 7=Sat) ─
    const DAYS = [
      { name:'Sunday',    short:'SUN', color:'#c05878', bg:'rgba(192,88,120,.12)' },
      { name:'Monday',    short:'MON', color:'#c07840', bg:'rgba(192,120,64,.12)' },
      { name:'Tuesday',   short:'TUE', color:'#c0a840', bg:'rgba(192,168,64,.12)' },
      { name:'Wednesday', short:'WED', color:'#4e9e72', bg:'rgba(78,158,114,.12)' },
      { name:'Thursday',  short:'THU', color:'#4a8ec0', bg:'rgba(74,142,192,.12)' },
      { name:'Friday',    short:'FRI', color:'#7858c0', bg:'rgba(120,88,192,.12)' },
      { name:'Saturday',  short:'SAT', color:'#c058a0', bg:'rgba(192,88,160,.12)' },
    ];

    const VENUES = {
      1: { label:'In-Person', cls:'ip' },
      2: { label:'Virtual',   cls:'vrt' },
      3: { label:'Hybrid',    cls:'hyb' },
    };

    // ── JSON syntax highlighter ────────────────────────
    function jsonHL(obj) {
      const raw = JSON.stringify(obj, null, 2);
      return esc(raw).replace(
        /(&quot;)(.*?)(&quot;)(\s*:)|(&quot;)(.*?)(&quot;)|(-?\d+\.?\d*(?:[eE][+-]?\d+)?)|(\btrue\b|\bfalse\b)|(\bnull\b)/g,
        (m, q1, k, q3, colon, q5, v, q7, num, bool, nil) => {
          if (colon)   return `<span class="json-key">${q1}${k}${q3}</span>${colon}`;
          if (q5)      return `<span class="json-str">${q5}${v}${q7}</span>`;
          if (num)     return `<span class="json-num">${num}</span>`;
          if (bool)    return `<span class="json-bool">${bool}</span>`;
          if (nil)     return `<span class="json-null">${nil}</span>`;
          return m;
        }
      );
    }

    // ── Helpers ────────────────────────────────────────
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function day(n)   { return DAYS[parseInt(n) - 1] || { name:'—', short:'?', color:'#677385', bg:'rgba(103,115,133,.1)' }; }
    function venue(n) { return VENUES[parseInt(n)]   || { label:'Unknown', cls:'' }; }

    // ── Status ─────────────────────────────────────────
    function setStatus(msg, type = 'idle') {
      document.getElementById('statusDot').className  = 'status-dot ' + type;
      document.getElementById('statusText').textContent = msg;
    }

    function setCount(shown, total) {
      const el = document.getElementById('resultCount');
      if (total == null) { el.textContent = ''; return; }
      el.textContent = shown === total ? `${total} result${total !== 1 ? 's' : ''}` : `${shown} of ${total}`;
    }

    // ── Skeleton ───────────────────────────────────────
    function showSkeletons(n = 4) {
      document.getElementById('loadMoreWrap').style.display = 'none';
      document.getElementById('results').innerHTML = Array.from({ length: n }, () => `
        <div class="skel-card">
          <div style="display:flex;gap:6px;margin-bottom:9px">
            <div class="skel-line" style="width:34px;height:17px;border-radius:100px"></div>
            <div class="skel-line" style="width:60px;height:17px;border-radius:100px"></div>
          </div>
          <div class="skel-line" style="width:58%;height:13px"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:9px">
            <div class="skel-line" style="width:80%;height:9px"></div>
            <div class="skel-line" style="width:70%;height:9px"></div>
          </div>
        </div>`).join('');
    }

    // ── Render meetings ────────────────────────────────
    function getFiltered() {
      let list = allMeetings;
      if (activeDayFilter   !== 'all') list = list.filter(m => String(m.weekday_tinyint) === activeDayFilter);
      if (activeVenueFilter !== 'all') list = list.filter(m => String(m.venue_type)       === activeVenueFilter);
      return list;
    }

    function renderMeetings(total) {
      const filtered = getFiltered();
      const slice    = filtered.slice(0, displayedCount);
      const wrap     = document.getElementById('loadMoreWrap');

      if (filtered.length === 0) {
        document.getElementById('results').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">◌</div>
            <p class="empty-text">No meetings match these filters</p>
          </div>`;
        wrap.style.display = 'none';
        setCount(0, total);
        return;
      }

      document.getElementById('results').innerHTML = slice.map(buildCard).join('');
      setCount(slice.length, total ?? filtered.length);

      if (slice.length < filtered.length) {
        wrap.style.display = 'block';
        document.getElementById('lmLabel').textContent = `Showing ${slice.length} of ${filtered.length}`;
      } else {
        wrap.style.display = 'none';
      }
    }

    function buildCard(m, i) {
      const d = day(m.weekday_tinyint);
      const v = venue(m.venue_type);
      const t = fmtTime(m.start_time);
      const dist = m.distance_in_miles
        ? `<span class="dist-badge">${parseFloat(m.distance_in_miles).toFixed(1)} mi</span>` : '';

      const fmts = m.formats
        ? m.formats.split(',').filter(Boolean).slice(0, 6)
            .map(f => `<span class="fmt-tag">${esc(f.trim())}</span>`).join('')
        : '';

      const link = m.virtual_meeting_link
        ? `<a href="${esc(m.virtual_meeting_link)}" target="_blank" rel="noopener" class="join-link">Join →</a>` : '';

      const isVirtual = parseInt(m.venue_type) === 2;
      const loc  = isVirtual
        ? (m.virtual_meeting_additional_info || 'Online')
        : (m.location_text || m.location_street || '—');
      const city = !isVirtual && m.location_municipality
        ? m.location_municipality + (m.location_province ? ', ' + m.location_province : '') : '';

      const delay = Math.min(i * 28, 280);

      return `
        <div class="meeting-card"
             style="--day-color:${d.color};--day-bg:${d.bg};animation-delay:${delay}ms"
             onclick="toggleExpand(this)">
          <div class="card-top">
            <div class="card-badges">
              <span class="day-badge" style="color:${d.color};background:${d.bg};border-color:${d.color}">${d.short}</span>
              <span class="venue-badge ${v.cls}">${v.label}</span>
              ${dist}
            </div>
            <button class="copy-btn"
                    onclick="copyMeeting(event,this)"
                    data-name="${esc(m.meeting_name)}"
                    data-day="${d.name}" data-time="${t}"
                    data-loc="${esc(loc)}" data-venue="${v.label}"
                    title="Copy meeting details">⎘</button>
          </div>

          <div class="meeting-name">${esc(m.meeting_name || 'Unnamed Meeting')}</div>

          <div class="card-meta">
            <div class="meta-i">
              <span class="meta-icon">◷</span>
              <span class="meta-t">${d.name} · ${t}</span>
            </div>
            <div class="meta-i">
              <span class="meta-icon">◍</span>
              <span class="meta-t" title="${esc(loc)}">${esc(loc)}</span>
            </div>
            ${city ? `<div class="meta-i" style="grid-column:2">
              <span class="meta-t" style="color:var(--text-d)">${esc(city)}</span>
            </div>` : ''}
          </div>

          ${(fmts || link) ? `
          <div class="card-foot">
            <div class="fmt-tags">${fmts}</div>
            ${link}
          </div>` : ''}

          <div class="card-exp">
            <div class="exp-grid">
              ${m.location_street ? `<div class="exp-item"><div class="exp-lbl">Street</div><div class="exp-val">${esc(m.location_street)}</div></div>` : ''}
              ${m.location_neighborhood ? `<div class="exp-item"><div class="exp-lbl">Neighborhood</div><div class="exp-val">${esc(m.location_neighborhood)}</div></div>` : ''}
              ${m.comments ? `<div class="exp-item" style="grid-column:1/-1"><div class="exp-lbl">Notes</div><div class="exp-val">${esc(m.comments)}</div></div>` : ''}
              ${m.virtual_meeting_additional_info && isVirtual ? `<div class="exp-item" style="grid-column:1/-1"><div class="exp-lbl">Virtual Info</div><div class="exp-val">${esc(m.virtual_meeting_additional_info)}</div></div>` : ''}
              ${m.contact_name_1 ? `<div class="exp-item"><div class="exp-lbl">Contact</div><div class="exp-val">${esc(m.contact_name_1)}</div></div>` : ''}
            </div>
          </div>
        </div>`;
    }

    // ── Global handlers ────────────────────────────────
    window.setDayFilter = function(btn) {
      activeDayFilter = btn.dataset.day;
      document.querySelectorAll('#dayFilters .chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      if (isMeetingMode) { displayedCount = PAGE; renderMeetings(allMeetings.length); }
    };

    window.setVenueFilter = function(btn) {
      activeVenueFilter = btn.dataset.venue;
      document.querySelectorAll('#venueFilters .chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      if (isMeetingMode) { displayedCount = PAGE; renderMeetings(allMeetings.length); }
    };

    window.loadMore = function() {
      displayedCount += PAGE;
      renderMeetings(allMeetings.length);
    };

    window.toggleExpand = function(card) { card.classList.toggle('expanded'); };

    window.copyMeeting = function(e, btn) {
      e.stopPropagation();
      const { name, day, time, loc, venue } = btn.dataset;
      navigator.clipboard.writeText(`${name}\n${day} at ${time}\n${loc}\n${venue}`)
        .then(() => toast('Copied to clipboard'));
    };

    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    function beginMeetingSearch() {
      isMeetingMode     = true;
      displayedCount    = PAGE;
    }

    // ── Search functions ───────────────────────────────
    window.searchByAddress = async function() {
      const address = document.getElementById('addressInput').value.trim();
      const radius  = parseFloat(document.getElementById('radiusInput').value);
      if (!address) { setStatus('Enter an address to search', 'error'); return; }

      beginMeetingSearch();
      setStatus('Searching near ' + address + '…', 'loading');
      showSkeletons();

      try {
        allMeetings = await client.searchMeetingsByAddress({
          address, radiusMiles: radius, sortByDistance: true,
          searchParams: { page_size: 100 },
        });
        renderMeetings(allMeetings.length);
        setStatus(
          allMeetings.length
            ? `${allMeetings.length} meetings near "${address}"`
            : `No meetings within ${radius} mi of "${address}"`,
          allMeetings.length ? 'success' : 'error'
        );
      } catch (err) {
        console.error(err);
        setStatus('Error: ' + err.message, 'error');
        document.getElementById('results').innerHTML =
          '<div class="empty-state"><p class="empty-text">Search failed. Check console.</p></div>';
      }
    };

    window.searchVirtualMeetings = async function() {
      beginMeetingSearch();
      setStatus('Loading virtual meetings…', 'loading');
      showSkeletons();
      try {
        allMeetings = await client.searchMeetings({ venue_types: VenueType.VIRTUAL, page_size: 80 });
        renderMeetings(allMeetings.length);
        setStatus(`${allMeetings.length} virtual meetings`, allMeetings.length ? 'success' : 'error');
      } catch (err) { setStatus('Error: ' + err.message, 'error'); }
    };

    window.searchTodaysMeetings = async function() {
      beginMeetingSearch();
      setStatus("Loading today's meetings…", 'loading');
      showSkeletons();
      try {
        allMeetings = await new QuickSearch(client).today().paginate(80, 1).execute();
        renderMeetings(allMeetings.length);
        setStatus(`${allMeetings.length} meetings today`, allMeetings.length ? 'success' : 'error');
      } catch (err) { setStatus('Error: ' + err.message, 'error'); }
    };

    window.searchWeekendMeetings = async function() {
      beginMeetingSearch();
      setStatus('Loading weekend meetings…', 'loading');
      showSkeletons();
      try {
        allMeetings = await new QuickSearch(client).weekend().paginate(80, 1).execute();
        renderMeetings(allMeetings.length);
        setStatus(`${allMeetings.length} weekend meetings`, allMeetings.length ? 'success' : 'error');
      } catch (err) { setStatus('Error: ' + err.message, 'error'); }
    };

    window.searchEveningMeetings = async function() {
      beginMeetingSearch();
      setStatus('Loading evening meetings…', 'loading');
      showSkeletons();
      try {
        allMeetings = await new QuickSearch(client).evening().paginate(80, 1).execute();
        renderMeetings(allMeetings.length);
        setStatus(`${allMeetings.length} evening meetings`, allMeetings.length ? 'success' : 'error');
      } catch (err) { setStatus('Error: ' + err.message, 'error'); }
    };

    window.getServerInfo = async function() {
      isMeetingMode = false;
      setStatus('Fetching server info…', 'loading');
      showSkeletons(2);
      try {
        const info = await client.getServerInfo();
        const d = Array.isArray(info) ? info[0] : info;
        document.getElementById('results').innerHTML = `
          <div class="data-card">
            <div class="data-title">Server Information</div>
            <div class="data-meta">
              <div><span style="color:var(--text-d)">URL</span> &nbsp; ${esc(client.getServerURL())}</div>
              <div><span style="color:var(--text-d)">Version</span> &nbsp; ${esc(d?.version ?? '—')}</div>
            </div>
            <pre class="data-pre">${jsonHL(d)}</pre>
          </div>`;
        setStatus('Server info loaded', 'success');
        setCount(null, null);
      } catch (err) { setStatus('Error: ' + err.message, 'error'); }
    };

    window.getFormats = async function() {
      isMeetingMode = false;
      setStatus('Fetching formats…', 'loading');
      showSkeletons(3);
      try {
        const formats = await client.getFormats();
        document.getElementById('results').innerHTML = formats.map((f, i) => `
          <div class="data-card" style="animation-delay:${i * 18}ms;opacity:0;animation-fill-mode:forwards">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span class="data-tag">${esc(f.key_string)}</span>
              <span class="data-title" style="margin:0">${esc(f.name_string)}</span>
            </div>
            <div class="data-meta">${esc(f.description_string || 'No description')}</div>
          </div>`).join('');
        setStatus(`${formats.length} formats`, 'success');
        setCount(formats.length, formats.length);
        document.getElementById('loadMoreWrap').style.display = 'none';
      } catch (err) { setStatus('Error: ' + err.message, 'error'); }
    };

    window.getServiceBodies = async function() {
      isMeetingMode = false;
      setStatus('Fetching service bodies…', 'loading');
      showSkeletons(3);
      try {
        const bodies = await client.getServiceBodies();
        document.getElementById('results').innerHTML = bodies.map((sb, i) => `
          <div class="data-card" style="animation-delay:${i * 18}ms;opacity:0;animation-fill-mode:forwards">
            <div class="data-title">${esc(sb.name)}</div>
            <div class="data-meta">
              <div><span style="color:var(--text-d)">Type</span> &nbsp; ${esc(sb.type)} &nbsp;&nbsp;
                   <span style="color:var(--text-d)">ID</span> &nbsp; ${sb.id}</div>
              ${sb.description ? `<div style="margin-top:4px">${esc(sb.description)}</div>` : ''}
              ${sb.url ? `<div style="margin-top:4px"><a href="${esc(sb.url)}" target="_blank" style="color:var(--info)">${esc(sb.url)}</a></div>` : ''}
            </div>
          </div>`).join('');
        setStatus(`${bodies.length} service bodies`, 'success');
        setCount(bodies.length, bodies.length);
        document.getElementById('loadMoreWrap').style.display = 'none';
      } catch (err) { setStatus('Error: ' + err.message, 'error'); }
    };

    window.testGeocode = async function() {
      const address = document.getElementById('geocodeInput').value.trim();
      if (!address) { setStatus('Enter an address to geocode', 'error'); return; }
      isMeetingMode = false;
      setStatus('Geocoding…', 'loading');
      showSkeletons(1);
      try {
        const r = await client.geocodeAddress(address);
        const addrLines = r.address
          ? Object.entries(r.address).filter(([,v]) => v)
              .map(([k,v]) => `<div><span style="color:var(--text-d)">${esc(k)}</span> &nbsp; ${esc(String(v))}</div>`).join('')
          : '';
        document.getElementById('results').innerHTML = `
          <div class="data-card">
            <div class="data-title">${esc(r.display_name)}</div>
            <div class="data-meta">
              <div><span style="color:var(--text-d)">Coordinates</span> &nbsp;
                ${r.coordinates.latitude.toFixed(6)}, ${r.coordinates.longitude.toFixed(6)}</div>
              ${r.confidence ? `<div><span style="color:var(--text-d)">Confidence</span> &nbsp; ${(r.confidence * 100).toFixed(1)}%</div>` : ''}
              ${addrLines ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-s)">${addrLines}</div>` : ''}
            </div>
          </div>`;
        setStatus('Geocoded successfully', 'success');
        setCount(null, null);
        document.getElementById('loadMoreWrap').style.display = 'none';
      } catch (err) {
        setStatus('Geocoding failed: ' + err.message, 'error');
        document.getElementById('results').innerHTML =
          '<div class="empty-state"><p class="empty-text">Address not found or service unavailable</p></div>';
      }
    };

    // ── Init ───────────────────────────────────────────
    setStatus('Ready — select a search', 'idle');
    console.log('BMLT Query Client loaded');
  </script>

</body>
</html>
